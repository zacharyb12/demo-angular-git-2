<h1>Registration Form</h1>

<div class="form">
    <form [formGroup]="formGroup" (ngsubmit)="signin()">
        <div>
            <label>Email</label>
            <br>
            <input type="text" formControlName="email">
        </div>
        <div>
            <label>Password</label>
            <br>
            <input type="text" formControlName="password">
        </div>
        <button type="submit">Sign in</button>

    </form>
</div>
